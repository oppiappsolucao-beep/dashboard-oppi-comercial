<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Oppi Comercial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/dashboard.css?v=7">
  <link rel="stylesheet" href="/static/css/registration.css?v=7">
  <link rel="stylesheet" href="/static/css/pricing.css?v=7">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="/static/js/app.js?v=7" defer></script>
</head>
<body class="app-body">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="sidebar-brand-text">
          Oppi Comercial
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="/visao-geral" class="sidebar-link {% if active_page == 'overview' %}active{% endif %}">
          <span class="sidebar-link-icon">▦</span> Visão Geral
        </a>
        <a href="/cadastro/novo" class="sidebar-link {% if active_page == 'registration_new' %}active{% endif %}">
          <span class="sidebar-link-icon">＋</span> Novo cadastro
        </a>
        <a href="/cadastro/todos" class="sidebar-link {% if active_page == 'contracts' %}active{% endif %}">
          <span class="sidebar-link-icon">☰</span> Todos os cadastros
        </a>
        <a href="/pesos-medidas" class="sidebar-link {% if active_page == 'pricing' %}active{% endif %}">
          <span class="sidebar-link-icon">◫</span> Pesos e Medidas
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar">{{ app_username[:2] | upper }}</div>
          <div>
            <div class="sidebar-user-name">{{ app_username }}</div>
            <div class="sidebar-user-role">Comercial</div>
          </div>
        </div>
        <form class="logout-form" method="post" action="/logout">
          <button type="submit" class="btn btn-secondary btn-block">Sair</button>
        </form>
      </div>
    </aside>
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
