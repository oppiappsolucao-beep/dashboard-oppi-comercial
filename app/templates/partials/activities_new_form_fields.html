<div class="activity-modal-grid">
  <div class="activity-modal-field activity-modal-field-wide">
    <label>Lead / Empresa <span class="req">*</span></label>
    <div class="activity-lead-search-wrap" id="new-activity-lead-search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="new-activity-lead-search" placeholder="Clique para ver leads e empresas ou busque pelo nome..." autocomplete="off">
      <div class="activity-lead-results" id="new-activity-lead-results"></div>
    </div>
    <div class="activity-lead-selected" id="new-activity-lead-selected">Nenhum lead selecionado.</div>
  </div>

  <div class="activity-modal-field">
    <label for="new-activity-stage">Etapa do funil <span class="req">*</span></label>
    <select name="stage" id="new-activity-stage" required>
      <option value="">Selecione a etapa</option>
      {% for option in pipeline_stage_options %}
      <option value="{{ option }}">{{ option }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="activity-modal-field">
    <label for="new-activity-channel">Canal <span class="req">*</span></label>
    <select name="channel" id="new-activity-channel" required>
      {% for option in channel_options %}
      <option value="{{ option }}" {% if option == 'WhatsApp' %}selected{% endif %}>{{ option }}</option>
      {% endfor %}
    </select>
    <input type="text" name="channel_other" id="new-activity-channel-other" class="activity-modal-other is-hidden" placeholder="Descreva o canal">
  </div>

  <div class="activity-modal-field">
    <label for="new-activity-responsible">Responsável <span class="req">*</span></label>
    <select name="assigned_user_id" id="new-activity-responsible" required>
      {% for option in responsible_options %}
      <option value="{{ option }}" {% if option == default_responsible %}selected{% endif %}>{{ option }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="activity-modal-field">
    <label for="new-activity-date">Data da atividade <span class="req">*</span></label>
    <input type="date" name="scheduled_date" id="new-activity-date" value="{{ today_iso }}" required>
    <div class="activity-quick-dates" id="new-activity-quick-dates">
      <button type="button" data-days="0">Hoje</button>
      <button type="button" data-days="1">Amanhã</button>
      <button type="button" data-days="1" data-business="1">Próximo dia útil</button>
      <button type="button" data-days="2">Em 2 dias</button>
      <button type="button" data-days="3">Em 3 dias</button>
      <button type="button" data-days="7">Em 7 dias</button>
    </div>
  </div>

  <div class="activity-modal-field">
    <label for="new-activity-time">Hora da atividade <span class="req">*</span></label>
    <input type="time" name="scheduled_time" id="new-activity-time" value="09:00" required>
  </div>

  <div class="activity-modal-field">
    <label for="new-activity-status">Status <span class="req">*</span></label>
    <select name="activity_status" id="new-activity-status" required>
      {% for value, label in status_options %}
      <option value="{{ value }}" {% if value == 'pendente' %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="activity-modal-field">
    <label for="new-activity-priority">Prioridade</label>
    <select name="priority" id="new-activity-priority">
      {% for option in priority_options %}
      <option value="{{ option }}" {% if option == 'Média' %}selected{% endif %}>{{ option }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="activity-modal-field activity-modal-field-wide">
    <label for="new-activity-description">Descrição da atividade</label>
    <textarea name="description" id="new-activity-description" rows="3" maxlength="1000"
      placeholder="Descreva o objetivo da atividade, informações importantes ou orientações para o responsável."></textarea>
    <div class="activity-char-count"><span id="new-activity-description-count">0</span>/1000</div>
  </div>
</div>

<details class="activity-modal-complement" id="new-activity-complement">
  <summary>
    <span>Campos complementares</span>
    <small>Preencha quando estiver registrando uma atividade já realizada.</small>
  </summary>
  <div class="activity-modal-grid">
    <div class="activity-modal-field">
      <label for="new-activity-result">Resultado do contato</label>
      <select name="result" id="new-activity-result">
        <option value="">Selecione</option>
        {% for option in result_options %}
        <option value="{{ option }}">{{ option }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="activity-modal-field activity-modal-field-wide">
      <label for="new-activity-note">Observação</label>
      <textarea name="note" id="new-activity-note" rows="3" maxlength="1000" placeholder="Descreva o resultado da atividade..."></textarea>
    </div>

    <div class="activity-modal-field">
      <label for="new-activity-next-action">Próxima ação</label>
      <select name="next_action" id="new-activity-next-action">
        <option value="">Selecione a próxima ação</option>
        {% for option in next_action_options %}
        <option value="{{ option }}">{{ option }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="activity-modal-field">
      <label for="new-activity-next-date">Data da próxima ação</label>
      <input type="date" name="next_action_date" id="new-activity-next-date">
    </div>

    <div class="activity-modal-field">
      <label for="new-activity-next-time">Hora da próxima ação</label>
      <input type="time" name="next_action_time" id="new-activity-next-time" value="10:00">
    </div>

    <div class="activity-modal-field">
      <label for="new-activity-next-channel">Canal da próxima ação</label>
      <select name="next_action_channel" id="new-activity-next-channel">
        <option value="">Selecione o canal</option>
        {% for option in channel_options %}
        <option value="{{ option }}">{{ option }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="activity-modal-field">
      <label for="new-activity-next-responsible">Responsável pela próxima ação</label>
      <select name="next_action_assigned" id="new-activity-next-responsible">
        <option value="">Selecione o responsável</option>
        {% for option in responsible_options %}
        <option value="{{ option }}">{{ option }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="activity-modal-field activity-modal-field-wide">
      <label for="new-activity-move-stage">Movimentar para próxima etapa?</label>
      <select name="move_stage" id="new-activity-move-stage">
        <option value="">Manter na etapa atual</option>
        {% for option in pipeline_stage_options %}
        <option value="{{ option }}">{{ option }}</option>
        {% endfor %}
      </select>
      <div class="activity-move-hint" id="new-activity-move-hint"></div>
      <label class="activity-move-confirm is-hidden" id="new-activity-move-confirm-wrap">
        <input type="checkbox" id="new-activity-move-checkbox">
        Confirmar movimentação de etapa
      </label>
    </div>

    <div class="activity-modal-field is-hidden" id="new-activity-lost-reason-wrap">
      <label for="new-activity-lost-reason">Motivo da perda</label>
      <select name="lost_reason" id="new-activity-lost-reason">
        <option value="">Selecione</option>
        {% for option in lost_reason_options %}
        <option value="{{ option }}">{{ option }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="activity-modal-field is-hidden" id="new-activity-close-value-wrap">
      <label for="new-activity-close-value">Valor final</label>
      <input type="text" name="close_value" id="new-activity-close-value" placeholder="R$ 0,00">
    </div>

    <div class="activity-modal-field is-hidden" id="new-activity-close-payment-wrap">
      <label for="new-activity-close-payment">Forma de pagamento</label>
      <input type="text" name="close_payment" id="new-activity-close-payment" placeholder="Ex.: PIX, boleto, cartão">
    </div>
  </div>
</details>

<script>
window.ACTIVITY_MODAL_NEXT_ACTIONS = {{ next_action_options_json | safe }};
window.ACTIVITY_MODAL_PREFILL = {{ {"sheet_row": prefill_sheet_row, "empresa": prefill_empresa}|tojson }};
window.ACTIVITY_MODAL_TODAY = "{{ today_iso }}";
</script>
{% if modal_error %}
<div class="activity-modal-error" id="new-activity-error">{{ modal_error }}</div>
{% else %}
<div class="activity-modal-error is-hidden" id="new-activity-error"></div>
{% endif %}
