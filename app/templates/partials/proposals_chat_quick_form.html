<form
  class="proposals-quick-form"
  hx-post="/propostas/chat"
  hx-target="#proposals-chat-panel"
  hx-swap="innerHTML"
>
  <div class="proposals-quick-form-title">Montar proposta</div>

  <label class="proposals-quick-field">
    <span>Buscar empresa cadastrada</span>
    <input
      type="search"
      id="proposals-company-search"
      class="proposals-company-search"
      placeholder="Digite para filtrar…"
      autocomplete="off"
      {% if pending_company %}disabled{% endif %}
    >
  </label>

  <label class="proposals-quick-field">
    <span>Empresa (cadastro)</span>
    <select
      name="empresa"
      id="proposals-company-select"
      class="proposals-company-select"
      required
      size="8"
      {% if pending_company %}disabled{% endif %}
    >
      <option value="" disabled {% if not pending_company %}selected{% endif %}>Selecione a empresa…</option>
      {% for company in company_options %}
      <option value="{{ company }}" {% if pending_company == company %}selected{% endif %}>{{ company }}</option>
      {% endfor %}
    </select>
    {% if pending_company %}
    <input type="hidden" name="empresa" value="{{ pending_company }}">
    <small class="proposals-quick-hint">Empresa selecionada: <strong>{{ pending_company }}</strong></small>
    {% endif %}
  </label>

  {% if not pending_company %}
  <button type="submit" class="btn proposals-quick-form-btn">Continuar</button>
  <small class="proposals-quick-hint">Em seguida eu pergunto a quantidade de colaboradores e sugiro o valor.</small>
  {% else %}
  <small class="proposals-quick-hint">Responda no chat: colaboradores → valor sugerido → confirmar ou alterar.</small>
  {% endif %}
</form>

<script>
(function () {
  var search = document.getElementById("proposals-company-search");
  var select = document.getElementById("proposals-company-select");
  if (!search || !select || search.disabled) return;
  search.addEventListener("input", function () {
    var q = (search.value || "").trim().toLowerCase();
    Array.prototype.forEach.call(select.options, function (opt, idx) {
      if (idx === 0 && !opt.value) {
        opt.hidden = false;
        return;
      }
      var label = (opt.textContent || "").toLowerCase();
      opt.hidden = q ? label.indexOf(q) === -1 : false;
    });
  });
})();
</script>
