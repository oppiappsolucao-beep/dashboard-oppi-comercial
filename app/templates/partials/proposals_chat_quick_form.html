<form
  class="proposals-quick-form"
  hx-post="/propostas/chat"
  hx-target="#proposals-chat-panel"
  hx-swap="innerHTML"
>
  <div class="proposals-quick-form-title">Montar proposta</div>

  <label class="proposals-quick-field">
    <span>Empresa</span>
    <input
      type="text"
      name="empresa"
      list="proposals-company-options"
      placeholder="Nome da empresa"
      required
      autocomplete="off"
    >
  </label>

  <label class="proposals-quick-field">
    <span>Serviço</span>
    <select name="servico" {% if not service_options %}disabled{% endif %}>
      <option value="">Selecione</option>
      {% for service in service_options %}
      <option value="{{ service }}">{{ service }}</option>
      {% endfor %}
    </select>
    {% if not service_options %}
    <small class="proposals-quick-hint">Cadastre serviços em <a href="/configuracoes?tab=servicos">Configurações → Serviços</a>.</small>
    {% endif %}
  </label>

  <div class="proposals-quick-form-row">
    <label class="proposals-quick-field">
      <span>Valor</span>
      <input type="text" name="valor_proposta" placeholder="Ex.: R$ 8.500" autocomplete="off">
    </label>

    <label class="proposals-quick-field">
      <span>Colaboradores</span>
      <select name="colaboradores">
        <option value="">Selecione</option>
        {% for option in colaborador_options %}
        <option value="{{ option }}">{{ option }}</option>
        {% endfor %}
      </select>
    </label>
  </div>

  <button type="submit" class="btn proposals-quick-form-btn">Gerar proposta</button>
</form>

<datalist id="proposals-company-options">
  {% for company in company_options %}
  <option value="{{ company }}"></option>
  {% endfor %}
</datalist>
