{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="/static/css/activities.css?v={{ static_version }}">
<link rel="stylesheet" href="/static/css/next-action-picker.css?v=1">
<div class="page-header">
  <div>
    <div class="page-title">Atividades</div>
    <div class="page-subtitle">Acompanhe o processo comercial por etapa e identifique rapidamente o que está atrasado.</div>
  </div>
  <div class="page-actions">
    <form method="post" action="/atividades/atualizar">
      <button type="submit" class="btn btn-secondary">↻ Atualizar</button>
    </form>
    <button type="button"
      class="btn"
      id="open-new-activity-btn"
      hx-get="/atividades/nova/modal"
      hx-target="#activity-modal-root"
      hx-swap="innerHTML">＋ Nova atividade</button>
  </div>
</div>

<div id="activity-modal-root"></div>
<div id="activity-drawer-root"></div>

<div id="activities-root">
  {% include "partials/activities_content.html" %}
</div>

<script src="/static/js/activities-kanban.js?v={{ static_version }}"></script>
<script src="/static/js/activities.js?v={{ static_version }}"></script>
<script src="/static/js/next-action-picker.js?v=2"></script>
{% endblock %}
