{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="/static/css/settings.css?v=12">
<div class="page-header">
  <div>
    <div class="page-title">Configurações</div>
    <div class="page-subtitle">Gerencie usuários, serviços, permissões e dados da operação SaaS.</div>
  </div>
  <div class="page-actions">
    <form method="post" action="/configuracoes/atualizar">
      <button type="submit" class="btn btn-secondary">↻ Atualizar</button>
    </form>
    <a href="/configuracoes?tab=usuarios&amp;subtab=usuarios" class="btn">＋ Novo usuário</a>
  </div>
</div>

<div id="settings-root">
  {% include "partials/settings_content.html" %}
</div>
<script>
  function settingsFiltersSubmit(options) {
    options = options || {};
    const container = document.getElementById("settings-filters");
    if (!container || typeof htmx === "undefined") return;
    if (options.tab) {
      document.getElementById("settings-tab-input").value = options.tab;
    }
    if (options.subtab) {
      const sub = document.getElementById("settings-subtab-input");
      if (sub) sub.value = options.subtab;
    }
    if (options.page) {
      document.getElementById("settings-page-input").value = options.page;
    }
    htmx.ajax("POST", "/configuracoes/filtros", {
      target: "#settings-root",
      swap: "innerHTML",
      values: htmx.values(container),
    });
  }

</script>
{% endblock %}
