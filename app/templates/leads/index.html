{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="/static/css/leads.css?v=4">
<div class="page-header">
  <div>
    <div class="page-title">Leads e Empresas</div>
    <div class="page-subtitle">Gerencie todos os seus leads e empresas em um só lugar.</div>
  </div>
  <div class="page-actions">
    <button type="button" class="btn btn-secondary leads-export-btn" id="leads-export-btn">
      <span class="leads-btn-icon" aria-hidden="true">↑</span> Exportar
    </button>
    <a href="/cadastro/novo" class="btn">＋ Novo Lead</a>
  </div>
</div>

<div id="leads-root">
  {% include "partials/leads_content.html" %}
</div>

<script>
function exportLeadsCsv() {
  var form = document.getElementById('leads-filters');
  if (!form) return;
  var params = new URLSearchParams(new FormData(form));
  window.location.href = '/leads-e-empresas/exportar?' + params.toString();
}
document.body.addEventListener('click', function (event) {
  if (event.target.closest('#leads-export-btn')) {
    exportLeadsCsv();
  }
});
</script>
{% endblock %}
