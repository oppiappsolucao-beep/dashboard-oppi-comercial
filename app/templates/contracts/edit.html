{% extends "base.html" %}
{% block content %}
<div class="registration-header-card">
  <div class="registration-kicker">OPPI COMERCIAL • EDITAR CADASTRO</div>
  <div class="registration-title">Editar {{ values.empresa }}</div>
</div>

{% if error %}<div class="alert-error">{{ error }}</div>{% endif %}

<form method="post" action="/cadastro/todos/{{ sheet_row }}/editar" class="form-card">
  <div class="form-grid">
    <div class="form-group"><label>Nome da empresa</label><input name="empresa" value="{{ values.empresa }}"></div>
    <div class="form-group"><label>Data de abertura</label><input name="data_abertura" value="{{ values.data_abertura }}"></div>
    <div class="form-group"><label>CNPJ</label><input name="cnpj" value="{{ values.cnpj }}"></div>
    <div class="form-group"><label>Capital social</label><input name="capital" value="{{ values.capital }}"></div>
  </div>
  <div class="form-grid registration-address-line cols-address-top">
    <div class="form-group address-endereco"><label>Endereço</label><input name="endereco" value="{{ values.endereco }}"></div>
    <div class="form-group address-numero"><label>Número</label><input name="endereco_numero" value="{{ values.endereco_numero }}"></div>
    <div class="form-group address-complemento"><label>Complemento</label><input name="endereco_complemento" value="{{ values.endereco_complemento }}"></div>
  </div>
  <div class="form-grid registration-address-line cols-address-bottom">
    <div class="form-group"><label>CEP</label><input name="cep" placeholder="00000-000" value="{{ values.cep }}"></div>
    <div class="form-group"><label>Bairro/Distrito</label><input name="bairro" value="{{ values.bairro }}"></div>
    <div class="form-group"><label>Município</label><input name="municipio" value="{{ values.municipio }}"></div>
    <div class="form-group"><label>UF</label><input name="uf" maxlength="2" placeholder="SP" value="{{ values.uf }}"></div>
  </div>
  <div class="form-grid">
    <div class="form-group"><label>E-mail</label><input name="email" value="{{ values.email }}"></div>
    <div class="form-group"><label>Site</label><input name="site" value="{{ values.site }}"></div>
    <div class="form-group"><label>Celular WhatsApp</label><input name="telefone_b2b" value="{{ values.telefone_b2b }}"></div>
    <div class="form-group"><label>Telefone fixo</label><input name="telefone_fixo" value="{{ values.telefone_fixo }}"></div>
    <div class="form-group"><label>Telefone alternativo</label><input name="telefone_alternativo" value="{{ values.telefone_alternativo }}"></div>
  </div>

  <div class="section-title">SÓCIOS E RESPONSÁVEIS</div>
  {% include "partials/partners_form_fields.html" %}

  <div class="section-title">REDES SOCIAIS E ACOMPANHAMENTO</div>
  <div class="form-grid">
    <div class="form-group"><label>Instagram</label><input name="instagram" value="{{ values.instagram }}"></div>
    <div class="form-group"><label>LinkedIn</label><input name="linkedin" value="{{ values.linkedin }}"></div>
    <div class="form-group"><label>Vendedor</label>
      <select name="vendedor">
        {% for seller in seller_options %}
        <option value="{{ seller }}" {% if vendedor == seller %}selected{% endif %}>{{ seller }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group"><label>Status</label>
      <select name="status">
        {% for status in status_options %}
        <option value="{{ status }}" {% if current_status == status %}selected{% endif %}>{{ status }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group"><label>Data do chamado</label><input type="date" name="data_chamado" value="{{ data_chamado }}"></div>
    <div class="form-group full"><label>Observações</label><textarea name="observacoes" rows="4">{{ values.observacoes }}</textarea></div>
  </div>

  <div class="section-title">PROPOSTA COMERCIAL</div>
  <div class="form-grid">
    <div class="form-group"><label>Serviço escolhido</label>
      <select name="servico">
        <option value="">Selecione</option>
        {% for service in service_options %}
        <option value="{{ service }}" {% if values.servico == service %}selected{% endif %}>{{ service }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group"><label>Valor da proposta</label><input name="valor_proposta" value="{{ values.valor_proposta }}" placeholder="Ex.: R$ 8.500"></div>
    <div class="form-group"><label>Quantidade de colaboradores</label>
      <select name="colaboradores">
        <option value="">Selecione</option>
        {% for option in colaborador_options %}
        <option value="{{ option }}" {% if values.colaboradores == option %}selected{% endif %}>{{ option }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div style="display:flex;gap:10px;margin-top:18px;">
    <button type="submit" name="action" value="save" class="btn">Salvar alterações</button>
    <button type="submit" name="action" value="cancel" class="btn btn-secondary">Cancelar</button>
  </div>
</form>
<script src="/static/js/partners-form.js?v=1" defer></script>
{% endblock %}
