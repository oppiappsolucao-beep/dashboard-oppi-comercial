{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="/static/css/overview.css?v=5">
<div class="page-header">
  <div>
    <div class="page-title">Concluir atividade</div>
    <div class="page-subtitle">{{ empresa }}</div>
  </div>
</div>

{% if overview_error %}
<div class="alert-error">{{ overview_error }}</div>
{% endif %}

<div class="panel operational-complete-form">
  <form method="post" action="/visao-geral/acoes/{{ sheet_row }}/concluir" class="form-grid operational-form-grid">
    <div class="form-group full">
      <label>Resultado do contato *</label>
      <select name="result" required>
        <option value="">Selecione</option>
        {% for option in result_options %}
        <option value="{{ option }}">{{ option }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group full">
      <label>Observação</label>
      <textarea name="note" rows="3" placeholder="Resumo do que foi tratado..."></textarea>
    </div>

    <div class="form-group">
      <label>Próxima ação *</label>
      <select name="next_action_description" required>
        <option value="">Selecione</option>
        {% for option in process_actions %}
        <option value="{{ option }}" {% if stored_next_action == option %}selected{% endif %}>{{ option }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Próxima ação — data *</label>
      <input type="date" name="next_action_date" value="{{ today }}" min="{{ today }}">
    </div>

    <div class="form-group">
      <label>Horário</label>
      <input type="time" name="next_action_time" value="{{ stored.next_action_time or '09:00' }}">
    </div>

    <div class="form-group">
      <label>Canal</label>
      <select name="next_action_type">
        {% for option in channel_options %}
        <option value="{{ channel_keys[option] }}" {% if stored.next_action_type == channel_keys[option] %}selected{% endif %}>{{ option }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Movimentar etapa?</label>
      <select name="move_stage">
        <option value="">Manter etapa atual</option>
        {% for option in stage_options %}
        <option value="{{ option }}">{{ option }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Oportunidade encerrada sem venda?</label>
      <select name="lead_closed">
        <option value="">Não — oportunidade continua aberta</option>
        <option value="1">Sim — fechar como perdida</option>
      </select>
    </div>

    <div class="form-group full" id="lost-reason-group" style="display:none;">
      <label>Motivo da perda</label>
      <select name="lost_reason">
        <option value="">Selecione</option>
        {% for option in lost_reason_options %}
        <option value="{{ option }}">{{ option }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group full operational-form-actions">
      <button type="submit" class="btn">Salvar e registrar histórico</button>
      <a href="/cadastro/todos/{{ sheet_row }}/editar?tab=atividades" class="btn btn-secondary">Abrir linha do tempo</a>
    </div>
  </form>
</div>
<script>
document.querySelector('select[name="lead_closed"]')?.addEventListener('change', function () {
  const group = document.getElementById('lost-reason-group');
  if (group) group.style.display = this.value === '1' ? 'block' : 'none';
});
document.querySelector('select[name="result"]')?.addEventListener('change', function () {
  const closed = document.querySelector('select[name="lead_closed"]');
  if (!closed) return;
  if (['Sem interesse', 'Contato inválido'].includes(this.value)) {
    closed.value = '1';
    closed.dispatchEvent(new Event('change'));
  }
});
</script>
{% endblock %}
