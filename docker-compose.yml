services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oppi_crm
      POSTGRES_USER: oppi
      POSTGRES_PASSWORD: oppi_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql+psycopg2://oppi:oppi_secret@db:5432/oppi_crm
      APP_SECRET_KEY: change-me-in-production
      RUN_SEED_ON_STARTUP: "false"
    depends_on:
      - db
    volumes:
      - ./generated:/app/generated
      - ./storage:/app/storage

volumes:
  postgres_data:
